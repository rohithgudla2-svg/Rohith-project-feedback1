<!DOCTYPE html>
<html>
<head>
    <title>Give Feedback</title>
</head>
<body>

<h2>Give Feedback</h2>

<form action="/submit-feedback" method="POST">

    <label>Select Student:</label>

    <select name="receiver_id">

        {% for student in students %}
        <option value="{{ student[0] }}">
            {{ student[0] }} - {{ student[1] }}
        </option>
        {% endfor %}

    </select>

    <br><br>

    <label>Rating:</label>

    <input type="number"
           name="rating"
           min="1"
           max="5"
           required>

    <br><br>

    <label>Comment:</label>

    <br>

    <textarea
        name="comment"
        rows="5"
        cols="40"
        required></textarea>

    <br><br>

    <button type="submit">
        Submit Feedback
    </button>

</form>

<br>

<a href="/dashboard">Back</a>

</body>
</html>
