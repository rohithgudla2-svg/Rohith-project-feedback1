<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h2>Student Login</h2>

<form action="/check" method="POST">

    <input type="text"
           name="student_id"
           placeholder="Student ID"
           required>

    <br><br>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <br><br>

    <button type="submit">Login</button>

</form>

</body>
</html>
